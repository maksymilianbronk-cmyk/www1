<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog stron — CRM</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13; --surface:#1a1a22; --surface-2:#22222e; --border:#2e2e3e;
  --accent:#6c63ff; --accent-dim:#3d3880; --accent-hover:#7d75ff;
  --text:#e8e8f0; --text-dim:#8888a0; --danger:#ff5c6c; --ok:#42d392;
  --radius:10px;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
.hidden{display:none!important}

/* ---------- Login ---------- */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px;z-index:50}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:40px 36px;width:100%;max-width:380px;text-align:center}
.login-card .logo{font-size:2.6rem;margin-bottom:6px}
.login-card h1{font-size:1.4rem;font-weight:700;letter-spacing:-.02em}
.login-card p{color:var(--text-dim);font-size:.9rem;margin-top:6px;margin-bottom:24px}
.login-card input{width:100%;padding:13px 15px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:1rem;text-align:center;letter-spacing:.1em}
.login-card input:focus{outline:none;border-color:var(--accent)}
.login-card button{width:100%;margin-top:14px;padding:13px;background:var(--accent);border:none;border-radius:var(--radius);color:#fff;font-size:1rem;font-weight:600;transition:background .15s}
.login-card button:hover{background:var(--accent-hover)}
.login-err{color:var(--danger);font-size:.85rem;margin-top:12px;min-height:1.2em}

/* ---------- Shell ---------- */
#app{display:grid;grid-template-columns:240px 1fr;grid-template-rows:auto 1fr;min-height:100vh}
header.topbar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-bottom:1px solid var(--border);background:var(--surface)}
.topbar .brand{display:flex;align-items:center;gap:10px;font-weight:700}
.topbar .brand .dot{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--accent),#b06cff);display:flex;align-items:center;justify-content:center;font-size:.9rem}
.topbar .right{display:flex;align-items:center;gap:14px}
.topbar .right .home{color:var(--text-dim);text-decoration:none;font-size:.85rem}
.topbar .right .home:hover{color:var(--text)}
.btn-logout{background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:7px 13px;border-radius:8px;font-size:.85rem}
.btn-logout:hover{border-color:var(--danger);color:var(--danger)}

aside.side{border-right:1px solid var(--border);padding:18px 12px;background:var(--surface)}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:8px;color:var(--text-dim);cursor:pointer;font-size:.92rem;font-weight:500;margin-bottom:4px}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:#fff}
.nav-item .ico{font-size:1.1rem}
.nav-item .count{margin-left:auto;font-size:.75rem;background:var(--surface-2);padding:1px 8px;border-radius:99px;color:var(--text-dim)}
.nav-item.active .count{background:rgba(0,0,0,.25);color:#fff}

main.content{padding:26px 30px;overflow:auto}

/* ---------- Generic UI ---------- */
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.page-head h2{font-size:1.5rem;font-weight:700;letter-spacing:-.02em}
.page-head .sub{color:var(--text-dim);font-size:.85rem;margin-top:2px}
.btn{background:var(--accent);border:none;color:#fff;padding:10px 16px;border-radius:8px;font-size:.9rem;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:background .15s}
.btn:hover{background:var(--accent-hover)}
.btn.ghost{background:var(--surface-2);border:1px solid var(--border);color:var(--text)}
.btn.ghost:hover{border-color:var(--accent-dim)}
.btn.sm{padding:6px 11px;font-size:.82rem}
.btn.danger{background:transparent;border:1px solid var(--border);color:var(--text-dim)}
.btn.danger:hover{border-color:var(--danger);color:var(--danger)}

.search{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;max-width:280px;flex:1}
.search input{background:none;border:none;color:var(--text);font-size:.9rem;width:100%}
.search input:focus{outline:none}

/* Folders grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px}
.folder{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:transform .15s,border-color .15s;position:relative}
.folder:hover{transform:translateY(-3px);border-color:var(--accent-dim)}
.folder .fico{font-size:2rem;margin-bottom:10px}
.folder .fname{font-weight:600;font-size:.98rem;word-break:break-word}
.folder .fmeta{color:var(--text-dim);font-size:.78rem;margin-top:5px}
.folder .fdel{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--text-dim);font-size:1rem;opacity:0;transition:opacity .15s}
.folder:hover .fdel{opacity:1}
.folder .fdel:hover{color:var(--danger)}

/* Table */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:.74rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-dim);padding:13px 16px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:13px 16px;border-bottom:1px solid var(--border);font-size:.9rem;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface-2)}
.badge{font-size:.74rem;padding:3px 10px;border-radius:99px;font-weight:600}
.badge.active{background:rgba(66,211,146,.15);color:var(--ok)}
.badge.inactive{background:rgba(136,136,160,.15);color:var(--text-dim)}
.badge.lead{background:rgba(108,99,255,.18);color:var(--accent-hover)}
.row-actions{display:flex;gap:6px;justify-content:flex-end}
.icon-btn{background:none;border:1px solid var(--border);border-radius:7px;color:var(--text-dim);width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;font-size:.9rem}
.icon-btn:hover{color:var(--text);border-color:var(--accent-dim)}
.icon-btn.del:hover{color:var(--danger);border-color:var(--danger)}

/* File manager */
.breadcrumb{display:flex;align-items:center;gap:8px;color:var(--text-dim);font-size:.9rem;margin-bottom:18px}
.breadcrumb a{color:var(--accent);cursor:pointer;text-decoration:none}
.breadcrumb a:hover{text-decoration:underline}
.dropzone{border:2px dashed var(--border);border-radius:var(--radius);padding:28px;text-align:center;color:var(--text-dim);margin-bottom:20px;transition:border-color .15s,background .15s}
.dropzone.drag{border-color:var(--accent);background:rgba(108,99,255,.06);color:var(--text)}
.dropzone .big{font-size:1.6rem;margin-bottom:6px}
.dropzone label{color:var(--accent);cursor:pointer;text-decoration:underline}
.file-row{display:flex;align-items:center;gap:14px;padding:12px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);margin-bottom:8px}
.file-row .fi{font-size:1.4rem}
.file-row .info{flex:1;min-width:0}
.file-row .nm{font-weight:500;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-row .meta{color:var(--text-dim);font-size:.78rem;margin-top:2px}

.empty{text-align:center;padding:70px 20px;color:var(--text-dim)}
.empty .big{font-size:2.4rem;margin-bottom:12px}
.empty h3{color:var(--text);font-weight:600;margin-bottom:6px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;padding:24px;z-index:40}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:26px;width:100%;max-width:440px}
.modal h3{font-size:1.2rem;font-weight:700;margin-bottom:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:.8rem;color:var(--text-dim);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.92rem}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
.field textarea{resize:vertical;min-height:72px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}

@media(max-width:760px){
  #app{grid-template-columns:1fr}
  aside.side{display:none}
}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <form class="login-card" id="loginForm">
    <div class="logo">🗂️</div>
    <h1>Katalog stron</h1>
    <p>Zaloguj się, aby zarządzać katalogiem</p>
    <input type="password" id="pwd" placeholder="Hasło" autocomplete="current-password" autofocus>
    <button type="submit">Zaloguj</button>
    <div class="login-err" id="loginErr"></div>
  </form>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <header class="topbar">
    <div class="brand"><span class="dot">🗂️</span> Katalog stron</div>
    <div class="right">
      <a class="home" href="../../">← kolekcja</a>
      <button class="btn-logout" id="logoutBtn">Wyloguj</button>
    </div>
  </header>

  <aside class="side">
    <div class="nav-item active" data-view="folders">
      <span class="ico">📁</span> Foldery stron <span class="count" id="cntFolders">0</span>
    </div>
    <div class="nav-item" data-view="promoters">
      <span class="ico">👥</span> Promotorzy <span class="count" id="cntPromoters">0</span>
    </div>
  </aside>

  <main class="content" id="content"></main>
</div>

<div id="modalRoot"></div>

<script>
/* =================================================================
   Katalog stron — prosty klientowy CRM
   - Auth: hasło "maxik" (uwaga: zabezpieczenie tylko po stronie
     przeglądarki, nie chroni danych kryptograficznie)
   - Dane strukturalne: localStorage
   - Pliki (zawartość): IndexedDB
   ================================================================= */
(function(){
"use strict";

const PASSWORD = "maxik";
const LS_KEY = "katalog_data_v1";
const AUTH_KEY = "katalog_auth_v1";

/* ---------- ID helper ---------- */
const uid = () => (crypto.randomUUID ? crypto.randomUUID()
  : 'id-'+Date.now()+'-'+Math.random().toString(36).slice(2,9));

/* ---------- IndexedDB (pliki) ---------- */
const FileDB = (() => {
  let dbp = null;
  function open(){
    if(dbp) return dbp;
    dbp = new Promise((res,rej)=>{
      const r = indexedDB.open("katalog_files",1);
      r.onupgradeneeded = () => r.result.createObjectStore("files");
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
    return dbp;
  }
  async function tx(mode){ return (await open()).transaction("files",mode).objectStore("files"); }
  return {
    async put(key,blob){ const s=await tx("readwrite"); return new Promise((res,rej)=>{const r=s.put(blob,key);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);}); },
    async get(key){ const s=await tx("readonly"); return new Promise((res,rej)=>{const r=s.get(key);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);}); },
    async del(key){ const s=await tx("readwrite"); return new Promise((res,rej)=>{const r=s.delete(key);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);}); }
  };
})();

/* ---------- Store ---------- */
let state = load();
function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { folders:[], promoters:[] };
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }

/* ---------- Utils ---------- */
function fmtSize(b){
  if(b<1024) return b+" B";
  if(b<1048576) return (b/1024).toFixed(1)+" KB";
  return (b/1048576).toFixed(1)+" MB";
}
function fmtDate(ts){ return new Date(ts).toLocaleDateString("pl-PL",{day:"2-digit",month:"short",year:"numeric"}); }
function fileIcon(type,name){
  const n=(name||"").toLowerCase();
  if(/^image\//.test(type)) return "🖼️";
  if(/\.(html?|css|js|ts|json)$/.test(n)) return "💻";
  if(/\.pdf$/.test(n)||type==="application/pdf") return "📕";
  if(/\.(zip|rar|7z|tar|gz)$/.test(n)) return "🗜️";
  if(/\.(doc|docx|txt|md|rtf)$/.test(n)) return "📄";
  if(/\.(xls|xlsx|csv)$/.test(n)) return "📊";
  return "📎";
}
function esc(s){ return String(s??"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* =================================================================
   AUTH
   ================================================================= */
const loginEl = document.getElementById("login");
const appEl = document.getElementById("app");

function isAuthed(){ return localStorage.getItem(AUTH_KEY)==="1"; }
function showApp(){ loginEl.classList.add("hidden"); appEl.classList.remove("hidden"); render(); }
function showLogin(){ appEl.classList.add("hidden"); loginEl.classList.remove("hidden"); document.getElementById("pwd").focus(); }

document.getElementById("loginForm").addEventListener("submit",e=>{
  e.preventDefault();
  const v = document.getElementById("pwd").value;
  if(v===PASSWORD){
    localStorage.setItem(AUTH_KEY,"1");
    document.getElementById("pwd").value="";
    document.getElementById("loginErr").textContent="";
    showApp();
  }else{
    document.getElementById("loginErr").textContent="Nieprawidłowe hasło";
    document.getElementById("pwd").select();
  }
});
document.getElementById("logoutBtn").addEventListener("click",()=>{
  localStorage.removeItem(AUTH_KEY);
  showLogin();
});

/* =================================================================
   NAV / ROUTER
   ================================================================= */
let view = "folders";      // "folders" | "promoters"
let openFolderId = null;   // gdy ustawiony -> widok managera plików

document.querySelectorAll(".nav-item").forEach(n=>{
  n.addEventListener("click",()=>{
    view = n.dataset.view;
    openFolderId = null;
    document.querySelectorAll(".nav-item").forEach(x=>x.classList.toggle("active",x===n));
    render();
  });
});

function render(){
  document.getElementById("cntFolders").textContent = state.folders.length;
  document.getElementById("cntPromoters").textContent = state.promoters.length;
  const c = document.getElementById("content");
  if(view==="folders"){
    c.innerHTML = openFolderId ? renderFileManager() : renderFolders();
    if(openFolderId) wireFileManager();
  }else{
    c.innerHTML = renderPromoters();
  }
}

/* =================================================================
   FOLDERS
   ================================================================= */
function renderFolders(){
  const list = state.folders.map(f=>`
    <div class="folder" data-id="${f.id}">
      <button class="fdel" data-del="${f.id}" title="Usuń">✕</button>
      <div class="fico">📁</div>
      <div class="fname">${esc(f.name)}</div>
      <div class="fmeta">${f.files.length} plik(ów) · ${fmtDate(f.createdAt)}</div>
    </div>`).join("");
  return `
    <div class="page-head">
      <div>
        <h2>Foldery stron</h2>
        <div class="sub">Każdy folder to jedna strona / projekt w katalogu</div>
      </div>
      <button class="btn" id="newFolder">＋ Nowy folder</button>
    </div>
    ${state.folders.length ? `<div class="grid" id="folderGrid">${list}</div>` : emptyState("📂","Brak folderów","Utwórz pierwszy folder, aby zacząć katalog stron.")}
  `;
}

function emptyState(ico,title,sub){
  return `<div class="empty"><div class="big">${ico}</div><h3>${esc(title)}</h3><p>${esc(sub)}</p></div>`;
}

document.getElementById("content").addEventListener("click",e=>{
  // Nowy folder
  if(e.target.id==="newFolder"){ promptNewFolder(); return; }
  // Usuń folder
  const del = e.target.closest("[data-del]");
  if(del){
    e.stopPropagation();
    const f = state.folders.find(x=>x.id===del.dataset.del);
    if(f && confirm(`Usunąć folder „${f.name}" wraz z plikami?`)) deleteFolder(f.id);
    return;
  }
  // Otwórz folder
  const card = e.target.closest(".folder");
  if(card){ openFolderId = card.dataset.id; render(); }
});

function promptNewFolder(){
  openModal({
    title:"Nowy folder strony",
    fields:[{name:"name",label:"Nazwa folderu / strony",required:true,placeholder:"np. Landing Promo 2026"}],
    onSave:(v)=>{
      state.folders.unshift({id:uid(),name:v.name.trim(),createdAt:Date.now(),files:[]});
      save(); render();
    }
  });
}
async function deleteFolder(id){
  const f = state.folders.find(x=>x.id===id);
  if(f){ for(const file of f.files){ try{await FileDB.del(file.dataKey);}catch(e){} } }
  state.folders = state.folders.filter(x=>x.id!==id);
  save(); render();
}

/* =================================================================
   FILE MANAGER
   ================================================================= */
function renderFileManager(){
  const f = state.folders.find(x=>x.id===openFolderId);
  if(!f){ openFolderId=null; return renderFolders(); }
  const files = f.files.map(fl=>`
    <div class="file-row">
      <span class="fi">${fileIcon(fl.type,fl.name)}</span>
      <div class="info">
        <div class="nm" title="${esc(fl.name)}">${esc(fl.name)}</div>
        <div class="meta">${fmtSize(fl.size)} · ${fmtDate(fl.addedAt)}</div>
      </div>
      <button class="icon-btn" data-dl="${fl.id}" title="Pobierz">⬇</button>
      <button class="icon-btn del" data-rm="${fl.id}" title="Usuń">🗑</button>
    </div>`).join("");
  return `
    <div class="breadcrumb"><a data-back>📁 Foldery</a> <span>/</span> <span>${esc(f.name)}</span></div>
    <div class="page-head">
      <div><h2>${esc(f.name)}</h2><div class="sub">${f.files.length} plik(ów)</div></div>
    </div>
    <div class="dropzone" id="dz">
      <div class="big">⬆️</div>
      <div>Przeciągnij pliki tutaj lub <label for="fileInput">wybierz z dysku</label></div>
      <input type="file" id="fileInput" multiple class="hidden">
    </div>
    <div id="fileList">${ f.files.length ? files : emptyState("📭","Pusty folder","Dodaj pierwsze pliki strony powyżej.") }</div>
  `;
}

function wireFileManager(){
  const f = state.folders.find(x=>x.id===openFolderId);
  if(!f) return;
  const content = document.getElementById("content");

  content.querySelector("[data-back]").addEventListener("click",()=>{ openFolderId=null; render(); });

  const dz = document.getElementById("dz");
  const input = document.getElementById("fileInput");
  input.addEventListener("change",()=>handleFiles(input.files));
  ["dragenter","dragover"].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add("drag");}));
  ["dragleave","drop"].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove("drag");}));
  dz.addEventListener("drop",e=>{ if(e.dataTransfer.files.length) handleFiles(e.dataTransfer.files); });

  document.getElementById("fileList").addEventListener("click",async e=>{
    const dl = e.target.closest("[data-dl]");
    const rm = e.target.closest("[data-rm]");
    if(dl) downloadFile(f, dl.dataset.dl);
    if(rm){
      const meta = f.files.find(x=>x.id===rm.dataset.rm);
      if(meta && confirm(`Usunąć plik „${meta.name}"?`)){
        try{await FileDB.del(meta.dataKey);}catch(e){}
        f.files = f.files.filter(x=>x.id!==rm.dataset.rm);
        save(); render();
      }
    }
  });

  async function handleFiles(fileList){
    for(const file of fileList){
      const key = uid();
      try{
        await FileDB.put(key, file);
        f.files.unshift({id:uid(),name:file.name,size:file.size,type:file.type,addedAt:Date.now(),dataKey:key});
      }catch(err){ alert("Nie udało się zapisać pliku: "+file.name); }
    }
    save(); render();
  }
  async function downloadFile(folder, fileId){
    const meta = folder.files.find(x=>x.id===fileId);
    if(!meta) return;
    const blob = await FileDB.get(meta.dataKey);
    if(!blob){ alert("Brak zawartości pliku."); return; }
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url; a.download=meta.name; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
  }
}

/* =================================================================
   PROMOTORZY
   ================================================================= */
let promoterSearch = "";
function renderPromoters(){
  const q = promoterSearch.toLowerCase();
  const rows = state.promoters
    .filter(p=>!q || (p.name+p.email+p.phone+(p.tag||"")).toLowerCase().includes(q))
    .map(p=>`
      <tr>
        <td><strong>${esc(p.name)}</strong></td>
        <td>${p.email?`<a href="mailto:${esc(p.email)}" style="color:var(--accent);text-decoration:none">${esc(p.email)}</a>`:'<span style="color:var(--text-dim)">—</span>'}</td>
        <td>${esc(p.phone)||'<span style="color:var(--text-dim)">—</span>'}</td>
        <td>${esc(p.tag)||'<span style="color:var(--text-dim)">—</span>'}</td>
        <td><span class="badge ${p.status||'lead'}">${statusLabel(p.status)}</span></td>
        <td><div class="row-actions">
          <button class="icon-btn" data-edit="${p.id}" title="Edytuj">✏️</button>
          <button class="icon-btn del" data-rmp="${p.id}" title="Usuń">🗑</button>
        </div></td>
      </tr>`).join("");
  return `
    <div class="page-head">
      <div><h2>Promotorzy</h2><div class="sub">Baza kontaktów i partnerów</div></div>
      <button class="btn" id="newPromoter">＋ Dodaj promotora</button>
    </div>
    <div class="page-head">
      <div class="search">🔍 <input id="promoterSearch" placeholder="Szukaj po nazwisku, e-mailu, tagu…" value="${esc(promoterSearch)}"></div>
    </div>
    ${state.promoters.length ? `
    <div class="table-wrap">
      <table>
        <thead><tr><th>Promotor</th><th>E-mail</th><th>Telefon</th><th>Tag</th><th>Status</th><th></th></tr></thead>
        <tbody>${rows || `<tr><td colspan="6" style="text-align:center;color:var(--text-dim);padding:30px">Brak wyników dla „${esc(promoterSearch)}"</td></tr>`}</tbody>
      </table>
    </div>` : emptyState("👤","Brak promotorów","Dodaj pierwszego promotora do bazy.")}
  `;
}
function statusLabel(s){ return s==="active"?"Aktywny":s==="inactive"?"Nieaktywny":"Lead"; }

document.getElementById("content").addEventListener("input",e=>{
  if(e.target.id==="promoterSearch"){
    promoterSearch = e.target.value;
    // przerysuj tylko tabelę, zachowaj focus
    const wrap = document.querySelector(".table-wrap") || document.querySelector(".empty");
    const html = renderPromoters();
    const tmp = document.createElement("div"); tmp.innerHTML=html;
    const newWrap = tmp.querySelector(".table-wrap") || tmp.querySelector(".empty");
    if(wrap && newWrap) wrap.replaceWith(newWrap);
  }
});

document.getElementById("content").addEventListener("click",e=>{
  if(e.target.id==="newPromoter"){ promoterModal(); return; }
  const ed = e.target.closest("[data-edit]");
  if(ed){ promoterModal(state.promoters.find(p=>p.id===ed.dataset.edit)); return; }
  const rm = e.target.closest("[data-rmp]");
  if(rm){
    const p = state.promoters.find(x=>x.id===rm.dataset.rmp);
    if(p && confirm(`Usunąć promotora „${p.name}"?`)){
      state.promoters = state.promoters.filter(x=>x.id!==rm.dataset.rmp);
      save(); render();
    }
  }
});

function promoterModal(existing){
  openModal({
    title: existing ? "Edytuj promotora" : "Nowy promotor",
    fields:[
      {name:"name",label:"Imię i nazwisko / nazwa",required:true,value:existing?.name||""},
      {name:"email",label:"E-mail",type:"email",value:existing?.email||""},
      {name:"phone",label:"Telefon",value:existing?.phone||""},
      {name:"tag",label:"Tag / kategoria",placeholder:"np. social, partner, agencja",value:existing?.tag||""},
      {name:"status",label:"Status",type:"select",options:[["lead","Lead"],["active","Aktywny"],["inactive","Nieaktywny"]],value:existing?.status||"lead"},
      {name:"note",label:"Notatka",type:"textarea",value:existing?.note||""}
    ],
    onSave:(v)=>{
      if(existing){ Object.assign(existing,v); }
      else { state.promoters.unshift({id:uid(),createdAt:Date.now(),...v}); }
      save(); render();
    }
  });
}

/* =================================================================
   MODAL
   ================================================================= */
function openModal({title,fields,onSave}){
  const root = document.getElementById("modalRoot");
  const fieldsHtml = fields.map(f=>{
    if(f.type==="select"){
      const opts = f.options.map(([val,lab])=>`<option value="${val}" ${f.value===val?"selected":""}>${lab}</option>`).join("");
      return `<div class="field"><label>${f.label}</label><select name="${f.name}">${opts}</select></div>`;
    }
    if(f.type==="textarea"){
      return `<div class="field"><label>${f.label}</label><textarea name="${f.name}" placeholder="${f.placeholder||""}">${esc(f.value||"")}</textarea></div>`;
    }
    return `<div class="field"><label>${f.label}${f.required?' *':''}</label><input name="${f.name}" type="${f.type||'text'}" value="${esc(f.value||"")}" placeholder="${f.placeholder||""}" ${f.required?"required":""}></div>`;
  }).join("");
  root.innerHTML = `
    <div class="modal-bg" id="modalBg">
      <form class="modal" id="modalForm">
        <h3>${esc(title)}</h3>
        ${fieldsHtml}
        <div class="modal-actions">
          <button type="button" class="btn ghost" id="modalCancel">Anuluj</button>
          <button type="submit" class="btn">Zapisz</button>
        </div>
      </form>
    </div>`;
  const close = ()=>{ root.innerHTML=""; };
  document.getElementById("modalCancel").addEventListener("click",close);
  document.getElementById("modalBg").addEventListener("click",e=>{ if(e.target.id==="modalBg") close(); });
  document.getElementById("modalForm").addEventListener("submit",e=>{
    e.preventDefault();
    const data={};
    fields.forEach(f=>{ data[f.name]=(e.target.elements[f.name].value||"").trim(); });
    if(fields.some(f=>f.required && !data[f.name])) return;
    onSave(data); close();
  });
  const first = root.querySelector("input,select,textarea"); if(first) first.focus();
}

/* =================================================================
   START
   ================================================================= */
if(isAuthed()) showApp(); else showLogin();

})();
</script>
</body>
