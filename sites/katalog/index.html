<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog stron — CRM</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;--surface:#1a1a22;--surface-2:#22222e;--surface-3:#2a2a38;
  --border:#2e2e3e;--accent:#6c63ff;--accent-dim:#3d3880;--accent-hover:#7d75ff;
  --text:#e8e8f0;--text-dim:#8888a0;--text-muted:#555570;
  --danger:#ff5c6c;--ok:#42d392;--warn:#f5a623;--info:#4ab3ff;
  --radius:10px;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
button,input,select,textarea{font-family:inherit}
.hidden{display:none!important}

/* ---------- Login ---------- */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px;z-index:50}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:40px 36px;width:100%;max-width:380px;text-align:center}
.login-card .logo{font-size:2.6rem;margin-bottom:6px}
.login-card h1{font-size:1.4rem;font-weight:700}
.login-card p{color:var(--text-dim);font-size:.9rem;margin-top:6px;margin-bottom:24px}
.login-card input{width:100%;padding:13px 15px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:1rem;text-align:center;letter-spacing:.1em}
.login-card input:focus{outline:none;border-color:var(--accent)}
.login-card button{width:100%;margin-top:14px;padding:13px;background:var(--accent);border:none;border-radius:var(--radius);color:#fff;font-size:1rem;font-weight:600;transition:background .15s}
.login-card button:hover{background:var(--accent-hover)}
.login-err{color:var(--danger);font-size:.85rem;margin-top:12px;min-height:1.2em}

/* ---------- Shell ---------- */
#app{display:grid;grid-template-columns:240px 1fr;grid-template-rows:auto 1fr;min-height:100vh}
header.topbar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-bottom:1px solid var(--border);background:var(--surface)}
.topbar .brand{display:flex;align-items:center;gap:10px;font-weight:700}
.topbar .brand .dot{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--accent),#b06cff);display:flex;align-items:center;justify-content:center;font-size:.9rem}
.topbar .right{display:flex;align-items:center;gap:14px}
.topbar .right a{color:var(--text-dim);text-decoration:none;font-size:.85rem}
.topbar .right a:hover{color:var(--text)}
.btn-logout{background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:7px 13px;border-radius:8px;font-size:.85rem;cursor:pointer}
.btn-logout:hover{border-color:var(--danger);color:var(--danger)}

aside.side{border-right:1px solid var(--border);padding:18px 12px;background:var(--surface)}
.nav-section{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);padding:4px 13px;margin-top:16px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:8px;color:var(--text-dim);cursor:pointer;font-size:.92rem;font-weight:500;margin-bottom:2px;user-select:none}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:#fff}
.nav-item .ico{font-size:1.1rem;width:20px;text-align:center}
.nav-item .count{margin-left:auto;font-size:.72rem;background:var(--surface-2);padding:2px 8px;border-radius:99px;color:var(--text-dim)}
.nav-item.active .count{background:rgba(0,0,0,.25);color:#fff}
.nav-item .new-badge{margin-left:auto;font-size:.65rem;background:var(--accent);padding:2px 6px;border-radius:99px;color:#fff;font-weight:700}
.side-footer{padding:16px 12px;margin-top:auto;border-top:1px solid var(--border)}
.side-footer a{display:flex;align-items:center;gap:8px;color:var(--text-muted);font-size:.8rem;text-decoration:none;padding:8px;border-radius:7px}
.side-footer a:hover{color:var(--text);background:var(--surface-2)}

main.content{padding:28px 32px;overflow:auto}

/* ---------- Generic UI ---------- */
.page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.page-head h2{font-size:1.5rem;font-weight:700;letter-spacing:-.02em}
.page-head .sub{color:var(--text-dim);font-size:.85rem;margin-top:3px}
.btn{background:var(--accent);border:none;color:#fff;padding:10px 16px;border-radius:8px;font-size:.88rem;font-weight:600;display:inline-flex;align-items:center;gap:7px;cursor:pointer;transition:background .15s}
.btn:hover{background:var(--accent-hover)}
.btn.ghost{background:var(--surface-2);border:1px solid var(--border);color:var(--text)}
.btn.ghost:hover{border-color:var(--accent-dim);background:var(--surface-3)}
.btn.sm{padding:6px 11px;font-size:.8rem}
.btn.ok{background:rgba(66,211,146,.15);color:var(--ok);border:1px solid rgba(66,211,146,.3)}
.btn.ok:hover{background:rgba(66,211,146,.25)}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 13px;width:280px}
.search-bar input{background:none;border:none;color:var(--text);font-size:.9rem;width:100%}
.search-bar input:focus{outline:none}
.icon-btn{background:none;border:1px solid var(--border);border-radius:7px;color:var(--text-dim);width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;font-size:.85rem;cursor:pointer}
.icon-btn:hover{color:var(--text);border-color:var(--accent-dim)}
.icon-btn.del:hover{color:var(--danger);border-color:var(--danger)}
.empty{text-align:center;padding:70px 20px;color:var(--text-dim)}
.empty .big{font-size:2.4rem;margin-bottom:12px}
.empty h3{color:var(--text);font-weight:600;margin-bottom:6px;font-size:1.1rem}
.empty p{font-size:.9rem;line-height:1.6}

/* ---------- Status badges ---------- */
.status{display:inline-flex;align-items:center;gap:5px;font-size:.73rem;font-weight:700;padding:3px 10px;border-radius:99px;text-transform:uppercase;letter-spacing:.04em}
.status::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.status.robocze{background:rgba(136,136,160,.15);color:var(--text-dim)}
.status.w-toku{background:rgba(108,99,255,.18);color:#a095ff}
.status.czeka{background:rgba(245,166,35,.18);color:var(--warn)}
.status.zatwierdzone{background:rgba(66,211,146,.15);color:var(--ok)}
.status.zakonczone{background:rgba(255,92,108,.15);color:var(--danger)}

/* ---------- Filter tabs ---------- */
.filter-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.ftab{padding:6px 14px;border-radius:99px;font-size:.78rem;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;transition:.15s}
.ftab:hover{border-color:var(--accent-dim);color:var(--text)}
.ftab.active{background:var(--accent-dim);border-color:var(--accent);color:#fff}
.ftab .cnt{font-size:.7rem;opacity:.8;margin-left:4px}

/* ---------- Project cards ---------- */
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .15s,transform .15s}
.proj-card:hover{border-color:var(--accent-dim);transform:translateY(-2px)}
.proj-card-bar{height:3px}
.proj-card-bar.robocze{background:var(--text-muted)}
.proj-card-bar.w-toku{background:var(--accent)}
.proj-card-bar.czeka{background:var(--warn)}
.proj-card-bar.zatwierdzone{background:var(--ok)}
.proj-card-bar.zakonczone{background:var(--danger)}
.proj-card-body{padding:18px}
.proj-client{font-size:.75rem;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.proj-name{font-size:1.05rem;font-weight:700;margin-bottom:8px}
.proj-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.proj-industry{font-size:.72rem;background:var(--surface-2);padding:3px 8px;border-radius:99px;color:var(--text-dim)}
.proj-url{margin-bottom:14px}
.proj-url-box{display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:8px 12px}
.proj-url-box span{flex:1;font-size:.76rem;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:monospace}
.proj-url-empty{font-size:.78rem;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.proj-actions{display:flex;gap:7px;flex-wrap:wrap}
.proj-date{margin-top:10px;font-size:.72rem;color:var(--text-muted)}

/* ---------- File manager ---------- */
.breadcrumb{display:flex;align-items:center;gap:8px;color:var(--text-dim);font-size:.9rem;margin-bottom:18px}
.breadcrumb a{color:var(--accent);cursor:pointer;text-decoration:none}
.breadcrumb a:hover{text-decoration:underline}
.folders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px}
.folder{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:transform .15s,border-color .15s;position:relative}
.folder:hover{transform:translateY(-3px);border-color:var(--accent-dim)}
.folder .fico{font-size:2rem;margin-bottom:10px}
.folder .fname{font-weight:600;font-size:.98rem;word-break:break-word}
.folder .fmeta{color:var(--text-dim);font-size:.78rem;margin-top:5px}
.folder .fdel{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--text-dim);font-size:1rem;opacity:0;cursor:pointer;transition:opacity .15s}
.folder:hover .fdel{opacity:1}
.folder .fdel:hover{color:var(--danger)}
.dropzone{border:2px dashed var(--border);border-radius:var(--radius);padding:28px;text-align:center;color:var(--text-dim);margin-bottom:20px;transition:border-color .15s}
.dropzone.drag{border-color:var(--accent);background:rgba(108,99,255,.06);color:var(--text)}
.dropzone .big{font-size:1.6rem;margin-bottom:6px}
.dropzone label{color:var(--accent);cursor:pointer;text-decoration:underline}
.file-row{display:flex;align-items:center;gap:14px;padding:12px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);margin-bottom:8px}
.file-row .fi{font-size:1.4rem}
.file-row .info{flex:1;min-width:0}
.file-row .nm{font-weight:500;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-row .meta{color:var(--text-dim);font-size:.78rem;margin-top:2px}

/* ---------- Table (promotors) ---------- */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-dim);padding:13px 16px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:13px 16px;border-bottom:1px solid var(--border);font-size:.9rem;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface-2)}
.badge{font-size:.74rem;padding:3px 10px;border-radius:99px;font-weight:600}
.badge.active{background:rgba(66,211,146,.15);color:var(--ok)}
.badge.inactive{background:rgba(136,136,160,.15);color:var(--text-dim)}
.badge.lead{background:rgba(108,99,255,.18);color:var(--accent-hover)}
.row-actions{display:flex;gap:6px;justify-content:flex-end}

/* ---------- Modal ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;padding:24px;z-index:40}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal.wide{max-width:680px}
.modal h3{font-size:1.2rem;font-weight:700;margin-bottom:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:.78rem;color:var(--text-dim);margin-bottom:6px;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.92rem}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
.field textarea{resize:vertical;min-height:80px;font-size:.85rem}
.field select option{background:var(--surface-2)}
.checkboxes{display:flex;flex-wrap:wrap;gap:8px}
.check-item{display:flex;align-items:center;gap:5px;cursor:pointer}
.check-item input{accent-color:var(--accent)}
.check-item span{font-size:.82rem;color:var(--text-dim)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;border-top:1px solid var(--border);padding-top:18px}

/* ---------- Brief modal ---------- */
.brief-wrap{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:16px;font-size:.82rem;font-family:monospace;color:var(--text);white-space:pre-wrap;line-height:1.7;max-height:360px;overflow-y:auto;margin-bottom:16px;word-break:break-word}
.copy-success{color:var(--ok);font-size:.82rem;margin-left:8px;transition:opacity .3s}

@media(max-width:820px){
  #app{grid-template-columns:1fr}
  aside.side{display:none}
  main.content{padding:20px 18px}
}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <form class="login-card" id="loginForm">
    <div class="logo">🗂️</div>
    <h1>Katalog stron</h1>
    <p>Panel zarządzania projektami i klientami</p>
    <input type="password" id="pwd" placeholder="Hasło dostępu" autocomplete="current-password" autofocus>
    <button type="submit">Zaloguj się →</button>
    <div class="login-err" id="loginErr"></div>
  </form>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <header class="topbar">
    <div class="brand">
      <span class="dot">🗂️</span> Katalog stron
    </div>
    <div class="right">
      <a href="../../">← kolekcja</a>
      <a href="../scenariusze/">🗺️ Scenariusze</a>
      <a href="../prompty/">📋 Prompty</a>
      <button class="btn-logout" id="logoutBtn">Wyloguj</button>
    </div>
  </header>

  <aside class="side">
    <div class="nav-section">Praca</div>
    <div class="nav-item active" data-view="projects">
      <span class="ico">🏗️</span> Projekty <span class="count" id="cntProjects">0</span>
    </div>
    <div class="nav-item" data-view="files">
      <span class="ico">📁</span> Zasoby / Pliki <span class="count" id="cntFolders">0</span>
    </div>
    <div class="nav-section">Baza</div>
    <div class="nav-item" data-view="promoters">
      <span class="ico">👥</span> Promotorzy <span class="count" id="cntPromoters">0</span>
    </div>
    <div class="side-footer">
      <a href="../scenariusze/">🗺️ Scenariusze pracy</a>
      <a href="../prompty/">📋 Biblioteka promptów</a>
    </div>
  </aside>

  <main class="content" id="content"></main>
</div>

<div id="modalRoot"></div>

<script>
(function(){
"use strict";

const PASSWORD = "maxik";
const LS_KEY = "katalog_data_v3";
const AUTH_KEY = "katalog_auth_v1";
const PAGES_BASE = "https://maksymilianbronk-cmyk.github.io/www1/sites/";

/* ---------- helpers ---------- */
const uid = () => crypto.randomUUID ? crypto.randomUUID() : 'id-'+Date.now()+'-'+Math.random().toString(36).slice(2,9);
function esc(s){ return String(s??"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(ts){ return new Date(ts).toLocaleDateString("pl-PL",{day:"2-digit",month:"short",year:"numeric"}); }
function fmtSize(b){ return b<1024?b+" B":b<1048576?(b/1024).toFixed(1)+" KB":(b/1048576).toFixed(1)+" MB"; }
function slugify(s){ return s.toLowerCase().replace(/ą/g,'a').replace(/ć/g,'c').replace(/ę/g,'e').replace(/ł/g,'l').replace(/ń/g,'n').replace(/ó/g,'o').replace(/ś/g,'s').replace(/ź|ż/g,'z').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
function fileIcon(type,name){ const n=(name||"").toLowerCase(); if(/^image\//.test(type))return"🖼️"; if(/\.(html?|css|js|ts|json)$/.test(n))return"💻"; if(/\.pdf$/.test(n))return"📕"; if(/\.(zip|rar|7z|tar|gz)$/.test(n))return"🗜️"; if(/\.(doc|docx|txt|md)$/.test(n))return"📄"; return"📎"; }

/* ---------- IndexedDB ---------- */
const FileDB=(()=>{
  let dbp=null;
  function open(){if(dbp)return dbp;dbp=new Promise((res,rej)=>{const r=indexedDB.open("katalog_files",1);r.onupgradeneeded=()=>r.result.createObjectStore("files");r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});return dbp;}
  async function tx(m){return(await open()).transaction("files",m).objectStore("files");}
  return{
    async put(k,v){const s=await tx("readwrite");return new Promise((res,rej)=>{const r=s.put(v,k);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});},
    async get(k){const s=await tx("readonly");return new Promise((res,rej)=>{const r=s.get(k);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});},
    async del(k){const s=await tx("readwrite");return new Promise((res,rej)=>{const r=s.delete(k);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);}); }
  };
})();

/* ---------- state ---------- */
const STATUS_MIGRATE = {szkic:"robocze","w-toku":"w-toku",wysłany:"czeka",gotowy:"zatwierdzone"};
let state = loadState();
function migrateProjects(projects){
  return (projects||[]).map(p=>({...p,status:STATUS_MIGRATE[p.status]||p.status||"robocze"}));
}
function loadState(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(raw){ const d=JSON.parse(raw); return{projects:migrateProjects(d.projects),folders:d.folders||[],promoters:d.promoters||}; }
  }catch(e){}
  // migrate from v2
  try{
    const v2=localStorage.getItem("katalog_data_v2");
    if(v2){ const d=JSON.parse(v2); return{projects:migrateProjects(d.projects),folders:d.folders||[],promoters:d.promoters||}; }
  }catch(e){}
  // migrate from v1
  try{
    const v1=localStorage.getItem("katalog_data_v1");
    if(v1){ const d=JSON.parse(v1); return{projects:[],folders:d.folders||[],promoters:d.promoters||}; }
  }catch(e){}
  return{projects:[],folders:[],promoters:[]};
}
function save(){ localStorage.setItem(LS_KEY,JSON.stringify(state)); }

/* ================================================================
   AUTH
   ================================================================ */
const loginEl=document.getElementById("login");
const appEl=document.getElementById("app");
function isAuthed(){return localStorage.getItem(AUTH_KEY)==="1";}
function showApp(){loginEl.classList.add("hidden");appEl.classList.remove("hidden");render();}
function showLogin(){appEl.classList.add("hidden");loginEl.classList.remove("hidden");document.getElementById("pwd").focus();}

document.getElementById("loginForm").addEventListener("submit",e=>{
  e.preventDefault();
  const v=document.getElementById("pwd").value;
  if(v===PASSWORD){localStorage.setItem(AUTH_KEY,"1");document.getElementById("pwd").value="";document.getElementById("loginErr").textContent="";showApp();}
  else{document.getElementById("loginErr").textContent="Nieprawidłowe hasło";document.getElementById("pwd").select();}
});
document.getElementById("logoutBtn").addEventListener("click",()=>{localStorage.removeItem(AUTH_KEY);showLogin();});

/* ================================================================
   NAV / ROUTER
   ================================================================ */
let view="projects";
let openFolderId=null;
let promoSearch="";

document.querySelectorAll(".nav-item").forEach(n=>{
  n.addEventListener("click",()=>{
    view=n.dataset.view;openFolderId=null;
    document.querySelectorAll(".nav-item").forEach(x=>x.classList.toggle("active",x===n));
    render();
  });
});

function render(){
  document.getElementById("cntProjects").textContent=state.projects.length;
  document.getElementById("cntFolders").textContent=state.folders.length;
  document.getElementById("cntPromoters").textContent=state.promoters.length;
  const c=document.getElementById("content");
  if(view==="projects") c.innerHTML=renderProjects();
  else if(view==="files"){ c.innerHTML=openFolderId?renderFileManager():renderFolders(); if(openFolderId)wireFileManager(); }
  else if(view==="promoters") c.innerHTML=renderPromoters();
}

/* ================================================================
   PROJECTS
   ================================================================ */
const STATUS_LABELS={robocze:"Robocze","w-toku":"W toku",czeka:"Czeka",zatwierdzone:"Zatwierdzone",zakonczone:"Zakończone"};
const STATUS_ORDER=["robocze","w-toku","czeka","zatwierdzone","zakonczone"];
let projFilter="all";
const INDUSTRY_LIST=["agencja reklamowa","architektura","beauty / SPA","budownictwo","e-commerce","edukacja / kursy","finanse","fotografia","gabinet / klinika","gastronomia","hotel / turystyka","IT / software","nieruchomości","portfolio / freelancer","prawo","przemysł","siłownia / fitness","sklep lokalny","startup","transport / logistyka","ślub / eventy","usługi lokalne","inne"];
const STYLE_LIST=["nowoczesny minimalistyczny","bold / energetyczny","elegancki / luksusowy","korporacyjny / profesjonalny","artystyczny / kreatywny","przyjazny / kolorowy","klasyczny / tradycyjny","dark / tech","jasny / pastelowy"];
const SECTIONS_LIST=[["hero","Hero / banner"],["o-nas","O nas"],["usługi","Usługi"],["portfolio","Portfolio / realizacje"],["cennik","Cennik"],["opinie","Opinie klientów"],["galeria","Galeria"],["blog","Blog / artykuły"],["faq","FAQ"],["kontakt","Kontakt"],["sklep","Sklep"],["rezerwacja","Rezerwacja online"],["team","Nasz zespół"],["partnerzy","Partnerzy / loga"]];

function renderProjects(){
  const all=state.projects;

  // count per status
  const counts={all:all.length};
  STATUS_ORDER.forEach(s=>{counts[s]=all.filter(p=>(p.status||"robocze")===s).length;});

  const filtered=projFilter==="all"?all:all.filter(p=>(p.status||"robocze")===projFilter);

  const tabsHtml=`<div class="filter-tabs">
    <div class="ftab ${projFilter==="all"?"active":""}" data-filter="all">Wszystkie<span class="cnt">${counts.all}</span></div>
    ${STATUS_ORDER.map(s=>`<div class="ftab ${projFilter===s?"active":""}" data-filter="${s}">${STATUS_LABELS[s]}<span class="cnt">${counts[s]}</span></div>`).join("")}
  </div>`;

  if(!filtered.length){
    const emptyMsg=projFilter==="all"
      ?`<div class="empty"><div class="big">🏗️</div><h3>Brak projektów</h3><p>Utwórz pierwszy projekt — wypełnij brief,<br>wygeneruj prompt dla Claude i opublikuj stronę dla klienta.</p></div>`
      :`<div class="empty"><div class="big">📭</div><h3>Brak projektów w kategorii „${STATUS_LABELS[projFilter]}"</h3><p>Zmień filtr lub dodaj nowy projekt.</p></div>`;
    return`
      <div class="page-head">
        <div><h2>Projekty klientów</h2><div class="sub">Zarządzaj zleceniami — generuj briefe, śledź statusy, wysyłaj linki</div></div>
        <button class="btn" id="newProj">＋ Nowy projekt</button>
      </div>
      ${tabsHtml}${emptyMsg}`;
  }

  const cards=filtered.map(p=>{
    const st=p.status||"robocze";
    const liveUrl=p.slug?`${PAGES_BASE}${p.slug}/`:"";
    const urlHtml=liveUrl
      ?`<div class="proj-url">
          <div class="proj-url-box">
            <span title="${esc(liveUrl)}">${esc(liveUrl)}</span>
            <button class="icon-btn" data-copy="${esc(liveUrl)}" title="Kopiuj link">📋</button>
            <a href="${esc(liveUrl)}" target="_blank" class="icon-btn" style="text-decoration:none" title="Otwórz">↗</a>
          </div>
        </div>`
      :`<div class="proj-url"><div class="proj-url-empty">⚠️ Brak slug — wygeneruj prompt i utwórz stronę</div></div>`;
    return`
      <div class="proj-card">
        <div class="proj-card-bar ${st}"></div>
        <div class="proj-card-body">
          <div class="proj-client">${esc(p.client||"klient")}</div>
          <div class="proj-name">${esc(p.name)}</div>
          <div class="proj-meta">
            <span class="status ${st}">${STATUS_LABELS[st]||st}</span>
            ${p.industry?`<span class="proj-industry">${esc(p.industry)}</span>`:""}
          </div>
          ${urlHtml}
          <div class="proj-actions">
            <button class="btn sm" data-brief="${p.id}">📋 Generuj prompt</button>
            <button class="btn ghost sm" data-edit-proj="${p.id}">✏️ Edytuj</button>
            <button class="icon-btn del" data-del-proj="${p.id}" title="Usuń">🗑</button>
          </div>
          <div class="proj-date">${fmtDate(p.createdAt)}</div>
        </div>
      </div>`;
  }).join("");

  return`
    <div class="page-head">
      <div><h2>Projekty klientów</h2><div class="sub">${all.length} projekt(ów) — kliknij „Generuj prompt" aby otworzyć brief dla Claude</div></div>
      <button class="btn" id="newProj">＋ Nowy projekt</button>
    </div>
    ${tabsHtml}
    <div class="projects-grid">${cards}</div>`;
}

document.getElementById("content").addEventListener("click",async e=>{
  // filter tabs
  const ft=e.target.closest("[data-filter]");
  if(ft){projFilter=ft.dataset.filter;render();return;}
  // new project
  if(e.target.id==="newProj"){openProjectModal();return;}
  // edit project
  const ep=e.target.closest("[data-edit-proj]");
  if(ep){openProjectModal(state.projects.find(p=>p.id===ep.dataset.editProj));return;}
  // delete project
  const dp=e.target.closest("[data-del-proj]");
  if(dp){
    const p=state.projects.find(x=>x.id===dp.dataset.delProj);
    if(p&&confirm(`Usunąć projekt „${p.name}"?`)){state.projects=state.projects.filter(x=>x.id!==dp.dataset.delProj);save();render();}
    return;
  }
  // brief
  const br=e.target.closest("[data-brief]");
  if(br){openBriefModal(state.projects.find(p=>p.id===br.dataset.brief));return;}
  // copy URL
  const cp=e.target.closest("[data-copy]");
  if(cp){
    try{await navigator.clipboard.writeText(cp.dataset.copy);}catch(err){prompt("Skopiuj ręcznie:",cp.dataset.copy);}
    const orig=cp.textContent;cp.textContent="✅";setTimeout(()=>cp.textContent=orig,1500);
    return;
  }
  // folders
  if(e.target.id==="newFolder"){promptNewFolder();return;}
  const del=e.target.closest("[data-del]");
  if(del){e.stopPropagation();const f=state.folders.find(x=>x.id===del.dataset.del);if(f&&confirm(`Usunąć folder „${f.name}"?`))deleteFolder(f.id);return;}
  const card=e.target.closest(".folder");
  if(card){openFolderId=card.dataset.id;render();}
  // promotors
  if(e.target.id==="newPromoter"){promoterModal();return;}
  const ed=e.target.closest("[data-edit]");
  if(ed){promoterModal(state.promoters.find(p=>p.id===ed.dataset.edit));return;}
  const rmp=e.target.closest("[data-rmp]");
  if(rmp){const p=state.promoters.find(x=>x.id===rmp.dataset.rmp);if(p&&confirm(`Usunąć promotora „${p.name}"?`)){state.promoters=state.promoters.filter(x=>x.id!==rmp.dataset.rmp);save();render();}}
});

/* --- project modal --- */

  }).join("");

  const industryOpts=INDUSTRY_LIST.map(i=>`<option ${existing?.industry===i?"selected":""}>${i}</option>`).join("");
  const styleOpts=STYLE_LIST.map(s=>`<option ${existing?.style===s?"selected":""}>${s}</option>`).join("");
  const statusOpts=[["robocze","Robocze"],["w-toku","W toku"],["czeka","Czeka na zatwierdzenie"],["zatwierdzone","Zatwierdzone"],["zakonczone","Zakończone"]].map(([v,l])=>`<option value="${v}" ${(existing?.status||"robocze")===v?"selected":""}>${l}</option>`).join("");

  const root=document.getElementById("modalRoot");
  root.innerHTML=`
    <div class="modal-bg" id="modalBg">

        <h3>${existing?"Edytuj projekt":"Nowy projekt"}</h3>
        <div class="two-col">
          <div class="field"><label>Nazwa projektu *</label><input name="name" value="${esc(existing?.name||"")}" required placeholder="np. Strona dla klienta ABC"></div>
          <div class="field"><label>Klient / firma *</label><input name="client" value="${esc(existing?.client||"")}" required placeholder="np. XYZ Sp. z o.o."></div>
        </div>
        <div class="two-col">
          <div class="field"><label>Slug URL <span style="color:var(--text-muted)">(nazwa folderu)</span></label><input name="slug" value="${esc(existing?.slug||"")}" placeholder="np. xyz-firma" id="slugField"></div>
          <div class="field"><label>Status</label><select name="status">${statusOpts}</select></div>
        </div>
        <div class="two-col">
          <div class="field"><label>Branża</label><select name="industry"><option value="">— wybierz —</option>${industryOpts}</select></div>
          <div class="field"><label>Styl strony</label><select name="style"><option value="">— wybierz —</option>${styleOpts}</select></div>
        </div>
        <div class="field"><label>Paleta kolorów</label><input name="colors" value="${esc(existing?.colors||"")}" placeholder="np. granat #1a2e5a, złoty #c9a84c"></div>
        <div class="field"><label>Sekcje strony</label><div class="checkboxes">${sections}</div></div>
        <div class="field"><label>Wymagania / notatki</label><textarea name="notes" placeholder="Dodatkowe wymagania, informacje o kliencie, treści...">${esc(existing?.notes||"")}</textarea></div>
        <div class="modal-actions">
          <button type="button" class="btn ghost" id="modalCancel">Anuluj</button>
          <button type="submit" class="btn">${existing?"Zapisz zmiany":"Utwórz projekt →"}</button>
        </div>
      </form>
    </div>`;

  // auto-slugify project name
  const nameInput=root.querySelector("[name=name]");
  const slugInput=document.getElementById("slugField");
  if(!existing) nameInput.addEventListener("input",()=>{ slugInput.value=slugify(nameInput.value); });

  document.getElementById("modalCancel").addEventListener("click",()=>root.innerHTML="");
  document.getElementById("modalBg").addEventListener("click",e=>{if(e.target.id==="modalBg")root.innerHTML="";});
  document.getElementById("projForm").addEventListener("submit",e=>{
    e.preventDefault();
    const fd=new FormData(e.target);
    const secs=SECTIONS_LIST.filter(([v])=>fd.get(`sec_${v}`)==="on").map(([v])=>v);
    const data={
      name:fd.get("name").trim(),client:fd.get("client").trim(),
      slug:slugify(fd.get("slug")||""),industry:fd.get("industry")||"",
      style:fd.get("style")||"",colors:fd.get("colors").trim(),
      sections:secs,notes:fd.get("notes").trim(),status:fd.get("status")||"robocze"
    };
    if(existing){Object.assign(existing,data);}
    else{state.projects.unshift({id:uid(),createdAt:Date.now(),...data});}
    save();root.innerHTML="";render();
  });
  nameInput.focus();
}

function renderFolders(){
  const list=state.folders.map(f=>`
    <div class="folder" data-id="${f.id}">
      <button class="fdel" data-del="${f.id}" title="Usuń">✕</button>
      <div class="fico">📁</div>
      <div class="fname">${esc(f.name)}</div>
      <div class="fmeta">${f.files.length} plik(ów) · ${fmtDate(f.createdAt)}</div>
    </div>`).join("");
  return`
    <div class="page-head">
      <div><h2>Zasoby / Pliki</h2><div class="sub">Foldery na materiały od klientów — grafiki, treści, dokumenty</div></div>
      <button class="btn" id="newFolder">＋ Nowy folder</button>
    </div>
    ${state.folders.length?`<div class="folders-grid">${list}</div>`:
    `<div class="empty"><div class="big">📂</div><h3>Brak folderów</h3><p>Twórz foldery na materiały do projektów.</p></div>`}`;
}
function promptNewFolder(){
  openModal({title:"Nowy folder",fields:[{name:"name",label:"Nazwa folderu",required:true,placeholder:"np. Materiały klient ABC"}],
    onSave:v=>{state.folders.unshift({id:uid(),name:v.name.trim(),createdAt:Date.now(),files:[]});save();render();}});
}
async function deleteFolder(id){
  const f=state.folders.find(x=>x.id===id);
  if(f)for(const file of f.files){try{await FileDB.del(file.dataKey);}catch(e){}}
  state.folders=state.folders.filter(x=>x.id!==id);save();render();
}
function renderFileManager(){
  const f=state.folders.find(x=>x.id===openFolderId);
  if(!f){openFolderId=null;return renderFolders();}
  const files=f.files.map(fl=>`
    <div class="file-row">
      <span class="fi">${fileIcon(fl.type,fl.name)}</span>
      <div class="info">
        <div class="nm" title="${esc(fl.name)}">${esc(fl.name)}</div>
        <div class="meta">${fmtSize(fl.size)} · ${fmtDate(fl.addedAt)}</div>
      </div>
      <button class="icon-btn" data-dl="${fl.id}" title="Pobierz">⬇</button>
      <button class="icon-btn del" data-rm="${fl.id}" title="Usuń">🗑</button>
    </div>`).join("");
  return`
    <div class="breadcrumb"><a data-back>📁 Zasoby</a> <span>/</span> <span>${esc(f.name)}</span></div>
    <div class="page-head"><div><h2>${esc(f.name)}</h2><div class="sub">${f.files.length} plik(ów)</div></div></div>
    <div class="dropzone" id="dz">
      <div class="big">⬆️</div>
      <div>Przeciągnij pliki lub <label for="fileInput">wybierz z dysku</label></div>
      <input type="file" id="fileInput" multiple class="hidden">
    </div>
    <div id="fileList">${f.files.length?files:`<div class="empty"><div class="big">📭</div><h3>Pusty folder</h3><p>Dodaj pliki powyżej.</p></div>`}</div>`;
}
function wireFileManager(){
  const f=state.folders.find(x=>x.id===openFolderId);if(!f)return;
  const c=document.getElementById("content");
  c.querySelector("[data-back]").addEventListener("click",()=>{openFolderId=null;render();});
  const dz=document.getElementById("dz");
  const input=document.getElementById("fileInput");
  input.addEventListener("change",()=>handleFiles(input.files));
  ["dragenter","dragover"].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add("drag");}));
  ["dragleave","drop"].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove("drag");}));
  dz.addEventListener("drop",e=>{if(e.dataTransfer.files.length)handleFiles(e.dataTransfer.files);});
  document.getElementById("fileList").addEventListener("click",async e=>{
    const dl=e.target.closest("[data-dl]");
    const rm=e.target.closest("[data-rm]");
    if(dl) downloadFile(f,dl.dataset.dl);
    if(rm){const m=f.files.find(x=>x.id===rm.dataset.rm);if(m&&confirm(`Usunąć „${m.name}"?`)){try{await FileDB.del(m.dataKey);}catch(e){}f.files=f.files.filter(x=>x.id!==rm.dataset.rm);save();render();}}
  });
  async function handleFiles(fileList){
    for(const file of fileList){
      const key=uid();
      try{await FileDB.put(key,file);f.files.unshift({id:uid(),name:file.name,size:file.size,type:file.type,addedAt:Date.now(),dataKey:key});}
      catch(err){alert("Błąd: "+file.name);}
    }
    save();render();
  }
  async function downloadFile(folder,fileId){
    const meta=folder.files.find(x=>x.id===fileId);if(!meta)return;
    const blob=await FileDB.get(meta.dataKey);if(!blob){alert("Brak pliku.");return;}
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=meta.name;a.click();setTimeout(()=>URL.revokeObjectURL(url),1500);
  }
}

/* ================================================================
   GENERIC MODAL
   ================================================================ */
function openModal({title,fields,onSave}){
  const root=document.getElementById("modalRoot");
  const fhtml=fields.map(f=>{
    if(f.type==="select"){const opts=f.options.map(([v,l])=>`<option value="${v}" ${f.value===v?"selected":""}>${l}</option>`).join("");return`<div class="field"><label>${f.label}</label><select name="${f.name}">${opts}</select></div>`;}
    if(f.type==="textarea")return`<div class="field"><label>${f.label}</label><textarea name="${f.name}" placeholder="${f.placeholder||""}">${esc(f.value||"")}</textarea></div>`;
    return`<div class="field"><label>${f.label}${f.required?" *":""}</label><input name="${f.name}" type="${f.type||"text"}" value="${esc(f.value||"")}" placeholder="${f.placeholder||""}" ${f.required?"required":""}></div>`;
  }).join("");
  root.innerHTML=`<div class="modal-bg" id="modalBg"><form class="modal" id="gf"><h3>${esc(title)}</h3>${fhtml}<div class="modal-actions"><button type="button" class="btn ghost" id="modalCancel">Anuluj</button><button type="submit" class="btn">Zapisz</button></div></form></div>`;
  const close=()=>root.innerHTML="";
  document.getElementById("modalCancel").addEventListener("click",close);
  document.getElementById("modalBg").addEventListener("click",e=>{if(e.target.id==="modalBg")close();});
  document.getElementById("gf").addEventListener("submit",e=>{e.preventDefault();const data={};fields.forEach(f=>{data[f.name]=(e.target.elements[f.name].value||"").trim();});if(fields.some(f=>f.required&&!data[f.name]))return;onSave(data);close();});
  const first=root.querySelector("input,select,textarea");if(first)first.focus();
}

/* ================================================================
   INIT
   ================================================================ */
if(isAuthed()) showApp(); else showLogin();
})();
</script>
</body>
</html>
