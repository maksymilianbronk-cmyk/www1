<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kolekcja stron www</title>
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
  <header class="site-header">
    <h1>Kolekcja stron www</h1>
    <p class="subtitle">Zbiór różnych projektów i eksperymentów webowych</p>
  </header>

  <main class="gallery" id="gallery">
    <!-- Karty stron są generowane przez JS z listy w sites.js -->
  </main>

  <footer class="site-footer">
    <p>Dodaj nową stronę: utwórz folder w <code>sites/</code> i dodaj wpis do <code>assets/js/sites.js</code></p>
  </footer>

  <!-- INFO MODAL -->
  <div class="info-modal" id="info-modal" role="dialog" aria-modal="true" aria-label="Informacje o stronie" tabindex="-1">
    <div class="info-modal-card">
      <button class="info-modal-close" id="modal-close" aria-label="Zamknij">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" crossorigin="anonymous"></script>
  <script src="assets/js/sites.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
